<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🇰🇷 韓國購物清單</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff9f5; font-family: system-ui, -apple-system, sans-serif; }
    input:focus { outline: 2px solid #ff9a9e; }
    ::-webkit-scrollbar { height: 4px; }
    ::-webkit-scrollbar-thumb { background: #f0b8b8; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
const { useState, useEffect, useRef } = React;

const INIT = [
  { id: 1, name: "大創", emoji: "🛍️", categories: [
    { id: 11, name: "化妝品類💄", items: [{ id: 111, name: "示範商品", image: "", priceKRW: 3000, note: "Basic 範例" }] },
    { id: 12, name: "其他", items: [] },
  ]},
  { id: 2, name: "Olive Young", emoji: "🫒", categories: [
    { id: 21, name: "化妝品類💄", items: [] },
    { id: 22, name: "保養品類", items: [] },
    { id: 23, name: "其他", items: [] },
  ]},
  { id: 3, name: "韓國藥局", emoji: "💊", categories: [
    { id: 31, name: "保養品類", items: [] },
  ]},
];

const KEY = "kr_shopping_v1";
const load = () => { try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; } catch { return null; } };
const save = s => { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch {} };

const fmt = n => n ? `₩${Number(n).toLocaleString()}` : "—";
const twd = (k, r) => k && r ? `≈ NT$${Math.round(k * r).toLocaleString()}` : "";

const L = { fontSize: 12, color: "#999", fontWeight: 600, display: "block", marginBottom: 4 };
const INP = { width: "100%", padding: "10px 12px", borderRadius: 10, border: "1.5px solid #f0d8d8", fontSize: 14, marginBottom: 12, boxSizing: "border-box", fontFamily: "inherit" };
const SBTN = { flex: 1, padding: 12, borderRadius: 12, border: "none", background: "linear-gradient(135deg,#ff6b6b,#ff9a9e)", color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" };
const CBTN = { flex: 1, padding: 12, borderRadius: 12, border: "1.5px solid #eee", background: "#fff", color: "#aaa", fontWeight: 600, fontSize: 15, cursor: "pointer" };

const e = React.createElement;

function App() {
  const [stores, setStores] = useState(() => load() || INIT);
  const [activeId, setActiveId] = useState(() => (load() || INIT)[0]?.id || 1);
  const [rate, setRate] = useState(0.023);
  const [rateStr, setRateStr] = useState("匯率載入中…");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const nid = useRef(9000);
  const uid = () => ++nid.current;
  const fileRef = useRef();

  useEffect(() => { save(stores); }, [stores]);

  useEffect(() => {
    fetch("https://open.er-api.com/v6/latest/KRW")
      .then(r => r.json())
      .then(d => {
        const r = d.rates && d.rates.TWD;
        if (r) { setRate(r); setRateStr(`1 KRW ≈ ${r.toFixed(4)} TWD（即時）`); }
        else setRateStr("1 KRW ≈ 0.0230 TWD（預設）");
      })
      .catch(() => setRateStr("1 KRW ≈ 0.0230 TWD（預設）"));
  }, []);

  const store = stores.find(s => s.id === activeId) || stores[0];
  const mut = fn => setStores(prev => { const d = JSON.parse(JSON.stringify(prev)); fn(d); return d; });
  const open = (type, extra) => { extra = extra || {}; setModal({ type, ...extra }); setForm(extra.item ? { ...extra.item } : (extra.defaults || {})); };
  const close = () => { setModal(null); setForm({}); };
  const fset = k => ev => setForm(f => ({ ...f, [k]: ev.target.value }));

  const handleImg = ev => {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = x => setForm(f => ({ ...f, image: x.target.result }));
    reader.readAsDataURL(file);
    ev.target.value = "";
  };

  const total = stores.reduce((a, s) => a + s.categories.reduce((b, c) => b + c.items.reduce((x, i) => x + (Number(i.priceKRW) || 0), 0), 0), 0);

  const saveItem = () => {
    mut(d => {
      const st = d.find(s => s.id === modal.storeId);
      const ct = st.categories.find(c => c.id === modal.catId);
      const item = { ...form, priceKRW: Number(form.priceKRW) || 0 };
      if (modal.item) { const i = ct.items.findIndex(x => x.id === modal.item.id); ct.items[i] = { ...item, id: modal.item.id }; }
      else ct.items.push({ ...item, id: uid() });
    });
    close();
  };

  // ── render helpers ──
  const Img = ({ src }) => e("div", { style: { width: 54, height: 54, borderRadius: 10, background: "#f5eaea", overflow: "hidden", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 } },
    src ? e("img", { src, alt: "", style: { width: "100%", height: "100%", objectFit: "cover" } }) : "🛒"
  );

  return e("div", { style: { minHeight: "100vh", background: "#fff9f5" } },

    // Header
    e("div", { style: { background: "linear-gradient(135deg,#ff6b6b,#ff9a9e)", padding: "18px 16px 14px", color: "#fff" } },
      e("div", { style: { maxWidth: 480, margin: "0 auto" } },
        e("div", { style: { fontSize: 20, fontWeight: 800 } }, "🇰🇷 韓國購物清單"),
        e("div", { style: { fontSize: 11, opacity: 0.85, marginTop: 2 } }, rateStr),
        e("div", { style: { marginTop: 10, background: "rgba(255,255,255,0.22)", borderRadius: 10, padding: "8px 14px", display: "inline-block" } },
          e("div", { style: { fontSize: 11, opacity: 0.9 } }, "預估總花費"),
          e("div", { style: { fontSize: 17, fontWeight: 700 } }, fmt(total) + " ", e("span", { style: { fontSize: 13, fontWeight: 400 } }, twd(total, rate)))
        )
      )
    ),

    e("div", { style: { maxWidth: 480, margin: "0 auto", padding: "0 16px 40px" } },

      // Store tabs
      e("div", { style: { display: "flex", gap: 8, overflowX: "auto", padding: "12px 0 4px" } },
        ...stores.map(s => e("button", { key: s.id, onClick: () => setActiveId(s.id), style: { whiteSpace: "nowrap", padding: "7px 14px", borderRadius: 20, border: "none", cursor: "pointer", fontWeight: 600, fontSize: 13, background: activeId === s.id ? "#ff6b6b" : "#f0e6e6", color: activeId === s.id ? "#fff" : "#a05050" } }, s.emoji + " " + s.name)),
        e("button", { onClick: () => open("store", { defaults: { name: "", emoji: "🛍️" } }), style: { whiteSpace: "nowrap", padding: "7px 14px", borderRadius: 20, border: "2px dashed #f0b8b8", background: "none", color: "#cc7777", cursor: "pointer", fontWeight: 600, fontSize: 13 } }, "＋ 新店家")
      ),

      store && e(React.Fragment, null,
        // Store header
        e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", margin: "14px 0 8px" } },
          e("div", { style: { fontSize: 17, fontWeight: 700, color: "#cc4444" } }, store.emoji + " " + store.name),
          e("div", { style: { display: "flex", gap: 8 } },
            e("button", { onClick: () => open("cat", { storeId: store.id, defaults: { name: "" } }), style: { fontSize: 12, padding: "5px 12px", borderRadius: 14, border: "none", background: "#ffe0e0", color: "#cc4444", cursor: "pointer", fontWeight: 600 } }, "＋ 分類"),
            e("button", { onClick: () => { if (window.confirm("刪除此店家？")) { const rest = stores.filter(s => s.id !== store.id); setStores(rest); setActiveId((rest[0] || {}).id); } }, style: { fontSize: 12, padding: "5px 8px", borderRadius: 14, border: "none", background: "#f5f5f5", color: "#bbb", cursor: "pointer" } }, "🗑")
          )
        ),

        // Categories
        ...store.categories.map(cat =>
          e("div", { key: cat.id, style: { marginBottom: 12, background: "#fff", borderRadius: 14, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", overflow: "hidden" } },
            e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 14px", background: "#fff5f5", borderBottom: "1px solid #ffe8e8" } },
              e("div", { style: { fontWeight: 700, color: "#cc4444", fontSize: 14 } }, cat.name),
              e("div", { style: { display: "flex", gap: 6 } },
                e("button", { onClick: () => open("item", { storeId: store.id, catId: cat.id }), style: { fontSize: 12, padding: "4px 10px", borderRadius: 12, border: "none", background: "#ff6b6b", color: "#fff", cursor: "pointer", fontWeight: 600 } }, "＋ 商品"),
                e("button", { onClick: () => { if (window.confirm("刪除此分類？")) mut(d => { const st = d.find(s => s.id === store.id); st.categories = st.categories.filter(c => c.id !== cat.id); }); }, style: { fontSize: 12, padding: "4px 8px", borderRadius: 12, border: "none", background: "#f0f0f0", color: "#bbb", cursor: "pointer" } }, "🗑")
              )
            ),
            cat.items.length === 0
              ? e("div", { style: { padding: 14, color: "#ccc", fontSize: 13, textAlign: "center" } }, "點「＋ 商品」新增")
              : cat.items.map(item =>
                e("div", { key: item.id, style: { display: "flex", gap: 10, padding: "10px 14px", borderBottom: "1px solid #fafafa", alignItems: "flex-start" } },
                  e(Img, { src: item.image }),
                  e("div", { style: { flex: 1 } },
                    e("div", { style: { fontWeight: 600, fontSize: 14 } }, item.name),
                    e("div", { style: { fontSize: 13, color: "#ff6b6b", fontWeight: 700 } }, fmt(item.priceKRW)),
                    e("div", { style: { fontSize: 12, color: "#aaa" } }, twd(item.priceKRW, rate)),
                    item.note && e("div", { style: { fontSize: 11, color: "#bbb", marginTop: 1 } }, "📝 " + item.note)
                  ),
                  e("div", { style: { display: "flex", gap: 4 } },
                    e("button", { onClick: () => open("item", { storeId: store.id, catId: cat.id, item }), style: { padding: "5px 8px", borderRadius: 10, border: "none", background: "#fff0f0", cursor: "pointer" } }, "✏️"),
                    e("button", { onClick: () => mut(d => { const st = d.find(s => s.id === store.id); const ct = st.categories.find(c => c.id === cat.id); ct.items = ct.items.filter(i => i.id !== item.id); }), style: { padding: "5px 8px", borderRadius: 10, border: "none", background: "#f5f5f5", color: "#bbb", cursor: "pointer" } }, "🗑")
                  )
                )
              )
          )
        )
      )
    ),

    // Hidden file input
    e("input", { ref: fileRef, type: "file", accept: "image/*", style: { display: "none" }, onChange: handleImg }),

    // Modal backdrop
    modal && e("div", { onClick: ev => ev.target === ev.currentTarget && close(), style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 999 } },
      e("div", { style: { background: "#fff", borderRadius: "20px 20px 0 0", padding: "24px 20px 36px", width: "100%", maxWidth: 480, maxHeight: "90vh", overflowY: "auto" } },

        // Item modal
        modal.type === "item" && e(React.Fragment, null,
          e("div", { style: { fontWeight: 700, fontSize: 16, marginBottom: 16, color: "#cc4444" } }, modal.item ? "✏️ 編輯商品" : "＋ 新增商品"),
          e("label", { style: L }, "商品名稱"),
          e("input", { style: INP, value: form.name || "", onChange: fset("name"), placeholder: "e.g. 防曬乳 SPF50" }),
          e("label", { style: L }, "商品圖片"),
          e("div", { style: { display: "flex", gap: 12, alignItems: "center", marginBottom: 14 } },
            e("div", { onClick: () => fileRef.current && fileRef.current.click(), style: { width: 72, height: 72, borderRadius: 12, border: "2px dashed #f0b8b8", background: "#fff5f5", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", overflow: "hidden", flexShrink: 0 } },
              form.image ? e("img", { src: form.image, alt: "", style: { width: "100%", height: "100%", objectFit: "cover" } }) : e("span", { style: { fontSize: 28 } }, "📷")
            ),
            e("div", null,
              e("button", { onClick: () => fileRef.current && fileRef.current.click(), style: { padding: "8px 16px", borderRadius: 12, border: "none", background: "#ffe0e0", color: "#cc4444", fontWeight: 600, fontSize: 13, cursor: "pointer", display: "block", marginBottom: 6 } }, "從相簿選擇"),
              form.image && e("button", { onClick: () => setForm(f => ({ ...f, image: "" })), style: { padding: "6px 12px", borderRadius: 12, border: "none", background: "#f5f5f5", color: "#aaa", fontSize: 12, cursor: "pointer" } }, "移除圖片")
            )
          ),
          e("label", { style: L }, "價格（韓元 ₩）"),
          e("input", { style: INP, type: "number", value: form.priceKRW || "", onChange: fset("priceKRW"), placeholder: "e.g. 15000" }),
          Number(form.priceKRW) > 0 && e("div", { style: { fontSize: 12, color: "#ff6b6b", marginBottom: 10, marginTop: -8 } }, twd(form.priceKRW, rate)),
          e("label", { style: L }, "備註"),
          e("input", { style: INP, value: form.note || "", onChange: fset("note"), placeholder: "e.g. 買兩個、限定色" }),
          e("div", { style: { display: "flex", gap: 10, marginTop: 4 } },
            e("button", { onClick: close, style: CBTN }, "取消"),
            e("button", { onClick: saveItem, style: SBTN }, "儲存")
          )
        ),

        // Category modal
        modal.type === "cat" && e(React.Fragment, null,
          e("div", { style: { fontWeight: 700, fontSize: 16, marginBottom: 16, color: "#cc4444" } }, "＋ 新增分類"),
          e("label", { style: L }, "分類名稱"),
          e("input", { style: INP, value: form.name || "", onChange: fset("name"), placeholder: "e.g. 保養品類🧴" }),
          e("div", { style: { display: "flex", gap: 10, marginTop: 4 } },
            e("button", { onClick: close, style: CBTN }, "取消"),
            e("button", { onClick: () => { mut(d => { d.find(s => s.id === modal.storeId).categories.push({ id: uid(), name: form.name, items: [] }); }); close(); }, style: SBTN }, "新增")
          )
        ),

        // Store modal
        modal.type === "store" && e(React.Fragment, null,
          e("div", { style: { fontWeight: 700, fontSize: 16, marginBottom: 16, color: "#cc4444" } }, "＋ 新增店家"),
          e("label", { style: L }, "店名"),
          e("input", { style: INP, value: form.name || "", onChange: fset("name"), placeholder: "e.g. 無印良品" }),
          e("label", { style: L }, "Emoji"),
          e("input", { style: INP, value: form.emoji || "", onChange: fset("emoji"), placeholder: "e.g. 🛒" }),
          e("div", { style: { display: "flex", gap: 10, marginTop: 4 } },
            e("button", { onClick: close, style: CBTN }, "取消"),
            e("button", { onClick: () => { const id = uid(); setStores(p => [...p, { id, name: form.name, emoji: form.emoji || "🛒", categories: [] }]); setActiveId(id); close(); }, style: SBTN }, "新增")
          )
        )
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
